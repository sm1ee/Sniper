<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded dark bg -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="#1a1d23"/>

  <!-- Scope -->
  <g transform="translate(64,64)" filter="url(#g)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#c9a96e" stroke-width="2.8" opacity="0.9"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="17" fill="none" stroke="#c9a96e" stroke-width="1.2" opacity="0.45"/>
    <!-- Crosshair -->
    <line x1="0" y1="-38" x2="0" y2="-22" stroke="#c9a96e" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
    <line x1="0" y1="22" x2="0" y2="38" stroke="#c9a96e" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
    <line x1="-38" y1="0" x2="-22" y2="0" stroke="#c9a96e" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
    <line x1="22" y1="0" x2="38" y2="0" stroke="#c9a96e" stroke-width="2.4" stroke-linecap="round" opacity="0.9"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="2.5" fill="#c9a96e"/>
    <!-- 45deg ticks -->
    <line x1="20" y1="-20" x2="23" y2="-23" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
    <line x1="20" y1="20" x2="23" y2="23" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
    <line x1="-20" y1="-20" x2="-23" y2="-23" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
    <line x1="-20" y1="20" x2="-23" y2="23" stroke="#c9a96e" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
